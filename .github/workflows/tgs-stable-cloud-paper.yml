name: TGS Stable Cloud Paper Trading Ver1.0
run-name: >-
  TGS Stable Cloud Phase1 |
  origin=${{ github.event_name == 'workflow_dispatch' && inputs.trigger_origin || 'github_schedule' }} |
  as_of=${{ github.event_name == 'workflow_dispatch' && inputs.as_of || 'scheduled_cutoff' }} |
  dispatch_key=${{ github.event_name == 'workflow_dispatch' && inputs.dispatch_key || 'none' }}

on:
  workflow_dispatch:
    inputs:
      as_of:
        description: "Required for execute/dry-run; not needed for init-only/verify-only"
        required: false
        type: string
        default: ""
      trigger_origin:
        description: "Invocation source; Cloudflare uses cloudflare_cron"
        required: true
        type: choice
        options:
          - manual_ui
          - cloudflare_cron
        default: manual_ui
      dispatch_key:
        description: "Required for cloudflare_cron; optional for manual_ui"
        required: false
        type: string
        default: ""
      dry_run:
        description: "Run without writing Google Sheets"
        required: true
        type: boolean
        default: true
      skip_dashboard:
        description: "Skip Dashboard summary update"
        required: true
        type: boolean
        default: false

jobs:
  daily-score-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
      GOOGLE_DASHBOARD_SPREADSHEET_ID: ${{ secrets.GOOGLE_DASHBOARD_SPREADSHEET_ID }}
      WORKFLOW_TRIGGER_EVENT: ${{ github.event_name }}
      WORKFLOW_TRIGGER_ORIGIN: ${{ github.event_name == 'workflow_dispatch' && inputs.trigger_origin || 'github_schedule' }}
      WORKFLOW_DISPATCH_KEY: ${{ github.event_name == 'workflow_dispatch' && inputs.dispatch_key || '' }}
      WORKFLOW_AS_OF: ${{ github.event_name == 'workflow_dispatch' && inputs.as_of || '' }}
      WORKFLOW_SCHEDULED_CRON: ${{ github.event_name == 'schedule' && github.event.schedule || '' }}
      WORKFLOW_SCHEDULE_TIMEZONE: "Asia/Tokyo"
      WORKFLOW_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
      WORKFLOW_SKIP_DASHBOARD: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_dashboard || false }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-cloud.txt

      - name: Install cloud dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-cloud.txt

      - name: Run cloud daily score check
        shell: bash
        run: |
          set -euo pipefail
          run_started_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          printf 'trigger_origin=%s\n' "${WORKFLOW_TRIGGER_ORIGIN}"
          printf 'dispatch_key=%s\n' "${WORKFLOW_DISPATCH_KEY}"
          args=(
            --trigger-event "${WORKFLOW_TRIGGER_EVENT}"
            --trigger-origin "${WORKFLOW_TRIGGER_ORIGIN}"
            --dispatch-key "${WORKFLOW_DISPATCH_KEY}"
            --run-started-at "${run_started_at}"
          )
          if [ "${WORKFLOW_TRIGGER_EVENT}" = "schedule" ]; then
            args+=(--execute)
            args+=(--scheduled-cron "${WORKFLOW_SCHEDULED_CRON}")
            args+=(--schedule-timezone "${WORKFLOW_SCHEDULE_TIMEZONE}")
          elif [ "${WORKFLOW_DRY_RUN}" != "true" ]; then
            args+=(--execute)
          fi
          if [ -n "${WORKFLOW_AS_OF}" ]; then
            args+=(--as-of "${WORKFLOW_AS_OF}")
          fi
          if [ "${WORKFLOW_SKIP_DASHBOARD}" = "true" ]; then
            args+=(--skip-dashboard)
          fi
          python stable_cloud_score_check.py "${args[@]}"

      - name: Upload dry-run/result artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tgs-stable-cloud-score-check
          path: outputs/cloud_score_check
          if-no-files-found: ignore
